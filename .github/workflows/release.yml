name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            artifact: kleinanzeigen-bot-linux
            ext: ""
          - os: macos-latest
            artifact: kleinanzeigen-bot-macos
            ext: ""
          - os: windows-latest
            artifact: kleinanzeigen-bot-windows
            ext: ".exe"
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -e ".[build]"

      - name: Build executable
        run: pyinstaller kleinanzeigen_bot.spec

      - name: Rename artifact
        shell: bash
        run: mv "dist/kleinanzeigen-bot${{ matrix.ext }}" "dist/${{ matrix.artifact }}${{ matrix.ext }}"

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}${{ matrix.ext }}

  release:
    name: Create Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/kleinanzeigen-bot-linux/kleinanzeigen-bot-linux
            artifacts/kleinanzeigen-bot-macos/kleinanzeigen-bot-macos
            artifacts/kleinanzeigen-bot-windows/kleinanzeigen-bot-windows.exe
